<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LAN Screen Monitor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="center">
  <div class="card">
    <h1>LAN Screen Monitor</h1>
    <p>網路跨平台螢幕監看（無伺服器版本，畫面以 P2P 直接傳輸，不支援平板設備）。選擇此裝置的角色：</p>
    <a class="btn full" href="client.html" style="display:block;text-align:center;margin-top:18px;">我是受監看裝置（被監看端）</a>
    <a class="btn full primary" href="viewer.html" style="display:block;text-align:center;margin-top:12px;">我是管理端（監看台）</a>
    <p class="note">
      管理端 <code>viewer.html?room=代碼</code> 可嵌入 Google Sites。<br />
      受監看裝置開啟 <code>client.html</code>，使用相同房間代碼登入。
    </p>
  </div>
</div>
</body>
</html>
