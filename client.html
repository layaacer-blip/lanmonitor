<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>受監看裝置 · LAN Screen Monitor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="center">
  <div class="card" id="setup">
    <h1>受監看裝置登入</h1>
    <p>登入後本機畫面會以點對點（P2P）方式直接傳給管理端。瀏覽器會要求你選擇分享來源，請選「整個螢幕」。</p>
    <label for="room">房間代碼（要與管理端相同）</label>
    <input id="room" placeholder="例如：classroom-a" autocomplete="off" />
    <label for="name">裝置名稱</label>
    <input id="name" placeholder="例如：電腦教室-01" autocomplete="off" />
    <button class="primary full" id="startBtn">登入並開始分享</button>
    <p class="note">
      登入後進入鎖定模式：全螢幕、停用右鍵、離開分頁或關閉視窗會通知管理端。<br />
      純網頁無法強制使用者完全無法關閉視窗；若需真正鎖死，請搭配作業系統 Kiosk 模式（見 README）。
    </p>
  </div>

  <div class="card hidden" id="live">
    <h1>分享中</h1>
    <p>本機畫面正以 P2P 傳送至管理端。請勿關閉此頁面。</p>
    <div class="status live" id="liveStatus" style="margin:12px 0;">連線中…</div>
    <div class="note" id="stats">房間：—</div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1/dist/peerjs.min.js"></script>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const roomInput = $('room'), nameInput = $('name'), startBtn = $('startBtn');
  const setupCard = $('setup'), liveCard = $('live');
  const liveStatus = $('liveStatus'), stats = $('stats');

  // Prefill from URL (?room=...&name=...) or last used.
  try {
    roomInput.value = params.get('room') || localStorage.getItem('lsm-room') || '';
    nameInput.value = params.get('name') || localStorage.getItem('lsm-name') || '';
  } catch (e) {}

  let peer, stream, conn, call, hubId, locked = false;
  let retryTimer = null;

  startBtn.addEventListener('click', start);

  async function start() {
    const room = (roomInput.value || '').trim();
    const name = (nameInput.value || '').trim() || ('裝置-' + Math.floor(Math.random() * 9000 + 1000));
    if (!room) { alert('請輸入房間代碼（要與管理端相同）。'); return; }
    try { localStorage.setItem('lsm-room', room); localStorage.setItem('lsm-name', name); } catch (e) {}

    if (typeof Peer === 'undefined') {
      alert('無法載入 P2P 元件，請確認此裝置可連上網際網路（用來載入程式與進行連線交握）。');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      alert('此瀏覽器不支援螢幕擷取，或頁面非 HTTPS。請用較新版 Chrome / Edge，並透過 https（GitHub Pages 即為 https）開啟。');
      return;
    }

    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 8 }, audio: false });
    } catch (err) {
      alert('未取得螢幕分享權限，無法登入。\n\n' + err.message);
      return;
    }

    stream.getVideoTracks()[0].addEventListener('ended', () => {
      sendEvent('screen-share-stopped');
      alert('螢幕分享已停止，請重新登入。');
      location.reload();
    });

    hubId = 'lsm-' + room + '-hub';
    setupCard.classList.add('hidden');
    liveCard.classList.remove('hidden');
    stats.textContent = '房間：' + room;
    initPeer(name);
    enterLockdown();
  }

  function initPeer(name) {
    peer = new Peer(); // random id from the public broker
    peer.on('open', () => connectToHub(name));
    peer.on('disconnected', () => { try { peer.reconnect(); } catch (e) {} });
    peer.on('error', (err) => {
      if (err.type === 'peer-unavailable') {
        liveStatus.textContent = '等待管理端開啟（房間：' + roomInput.value.trim() + '）…';
        liveStatus.className = 'status stale';
        scheduleRetry(name);
      } else {
        liveStatus.textContent = '連線錯誤：' + err.type + ' — 重試中';
        liveStatus.className = 'status stale';
        scheduleRetry(name);
      }
    });
  }

  function connectToHub(name) {
    // Data channel for registration + lockdown events.
    conn = peer.connect(hubId, { reliable: true });
    conn.on('open', () => {
      conn.send({ type: 'hello', name });
      liveStatus.textContent = '已連上管理端 · 傳送畫面中';
      liveStatus.className = 'status live';
    });
    conn.on('close', () => scheduleRetry(name));

    // Media call: send our screen to the hub (answer-only on the hub side).
    call = peer.call(hubId, stream);
    if (call) {
      call.on('close', () => scheduleRetry(name));
      call.on('error', () => scheduleRetry(name));
    }
  }

  function scheduleRetry(name) {
    if (retryTimer) return;
    retryTimer = setTimeout(() => {
      retryTimer = null;
      if (peer && peer.open) connectToHub(name);
    }, 3000);
  }

  function sendEvent(type) {
    if (conn && conn.open) conn.send({ type: 'event', event: type, ts: Date.now() });
  }

  // ---- Lockdown (browser-level deterrents; OS Kiosk needed for true lock) ----
  function enterLockdown() {
    locked = true;
    const goFs = () => { const el = document.documentElement; if (el.requestFullscreen) el.requestFullscreen().catch(() => {}); };
    goFs();
    document.addEventListener('fullscreenchange', () => {
      if (locked && !document.fullscreenElement) { sendEvent('exited-fullscreen'); setTimeout(goFs, 300); }
    });
    window.addEventListener('beforeunload', (e) => {
      if (!locked) return; sendEvent('attempt-close'); e.preventDefault(); e.returnValue = ''; return '';
    });
    document.addEventListener('visibilitychange', () => { if (locked && document.hidden) sendEvent('tab-hidden'); });
    window.addEventListener('blur', () => { if (locked) sendEvent('window-blur'); });
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      const blocked = e.key === 'F11' ||
        (e.ctrlKey && ['w', 'r', 't', 'n'].includes(k)) ||
        (e.metaKey && ['w', 'r'].includes(k));
      if (blocked) { e.preventDefault(); sendEvent('blocked-key:' + e.key); }
    });
  }
})();
</script>
</body>
</html>
